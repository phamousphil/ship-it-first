<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="version" content="0.8" />
<title>Ship it First!</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#f5f4f0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#1a1a1a;}

/* wrapper sized by JS to exactly window.innerHeight */
#shell{display:flex;flex-direction:column;align-items:center;width:100%;overflow:hidden;}

/* top section - never scrolls */
#top{width:100%;max-width:420px;flex-shrink:0;}
#header{text-align:center;padding:6px 16px 5px;border-bottom:1px solid #e0ddd5;background:#f5f4f0;}
#header h1{font-size:14px;font-weight:800;letter-spacing:0.01em;line-height:1.3;}
#header .subtitle{font-size:10px;color:#999;font-style:italic;margin-top:1px;}
#header .rule{font-size:11px;color:#444;font-weight:600;margin-top:3px;}

#target-banner{background:#fff;border-bottom:1px solid #e0ddd5;padding:6px 12px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;}
#target-banner .label{font-size:11px;color:#aaa;letter-spacing:0.06em;text-transform:uppercase;text-align:center;}
#target-banner .target-word{font-size:26px;font-weight:800;letter-spacing:0.25em;color:#1a1a1a;text-align:center;}
#target-center{text-align:center;}
.stat{background:#f5f4f0;border:1px solid #e0ddd5;border-radius:6px;padding:4px 10px;text-align:center;}
.stat-val{font-size:16px;font-weight:700;color:#1a1a1a;line-height:1;}
.stat-label{font-size:10px;color:#aaa;margin-top:1px;}

/* middle - scrolls, takes all remaining space */
#chain-area{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;width:100%;max-width:420px;padding:6px 16px 4px;}

/* chain rows */
.chain-step{display:flex;align-items:center;justify-content:center;gap:8px;padding:3px 0;}
.step-num{font-size:11px;color:#ccc;width:18px;text-align:right;flex-shrink:0;}
.step-word{display:flex;gap:5px;}
.step-letter{width:52px;height:56px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;border:1.5px solid #e0ddd5;border-radius:8px;background:#fff;color:#1a1a1a;}
.step-letter.seed{background:#f0eeea;border-color:#d0cdc5;color:#999;}
.step-letter.correct{background:#6aaa64;border-color:#6aaa64;color:#fff;}
.step-letter.wrong{background:#fff;border-color:#e0ddd5;color:#1a1a1a;}
.input-box{width:52px;height:56px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;border:1.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:default;}
.input-box.active{border-color:#185FA5;box-shadow:0 0 0 2px rgba(24,95,165,0.15);}
.input-box.changed{border-color:#185FA5;background:#e8f1fb;color:#0c447c;}

/* bottom section - never scrolls */
#bottom{width:100%;max-width:420px;flex-shrink:0;border-top:1px solid #e0ddd5;background:#f5f4f0;}
#error-msg{font-size:12px;color:#c0392b;min-height:16px;text-align:center;padding:2px 16px 0;}
#keyboard{padding:3px 6px 4px;display:flex;flex-direction:column;gap:4px;}
.kb-row{display:flex;justify-content:center;gap:4px;}
.kb-key{height:40px;min-width:30px;flex:1;max-width:38px;background:#d3d6da;border:none;border-radius:6px;font-size:14px;font-weight:700;color:#1a1a1a;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.kb-key:active{transform:scale(0.94);}
.kb-key.wide{min-width:44px;max-width:54px;font-size:12px;}
.kb-key.submit{background:#1a1a1a;color:#fff;min-width:54px;max-width:64px;font-size:12px;letter-spacing:0.03em;}
.kb-key.submit:active{background:#333;}
#hint-row{text-align:center;padding:3px 16px 5px;border-top:1px solid #e0ddd5;}
#hint-btn{font-size:12px;color:#999;background:none;border:none;cursor:pointer;text-decoration:underline;text-decoration-style:dotted;padding:2px 6px;}
#hint-btn:hover{color:#555;}
#hint-text{font-size:12px;color:#185FA5;min-height:14px;font-weight:500;}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);align-items:center;justify-content:center;z-index:100;padding:1rem;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:16px;padding:1.75rem 1.5rem;max-width:340px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.18);}
.modal h2{font-size:21px;font-weight:700;margin-bottom:0.4rem;}
.modal p{font-size:13px;color:#666;margin-bottom:1rem;line-height:1.6;}
.modal-grid{background:#f5f4f0;border-radius:8px;padding:0.75rem 1rem;margin-bottom:1rem;font-size:24px;line-height:1.8;letter-spacing:3px;}
.modal-btn{width:100%;padding:12px;font-size:14px;border-radius:10px;cursor:pointer;margin-bottom:7px;font-weight:600;transition:background 0.15s;}
#share-btn{background:#1a1a1a;color:#fff;border:none;}
#share-btn:hover{background:#333;}
#new-game-btn{background:#fff;color:#1a1a1a;border:1px solid #ccc;}
#new-game-btn:hover{background:#f5f4f0;}
#copied-msg{font-size:12px;color:#aaa;margin-top:3px;min-height:15px;}
</style>
</head>
<body>
<div id="shell">
  <div id="top">
    <div id="header">
      <h1>Ship it First! 🚀 What could go wrong? 📈</h1>
      <div class="subtitle">The word ladder game that embodies the ethos of failed tech startups across the globe</div>
      <div class="rule">Change one letter at a time to reach the target from the seed word SHIP</div>
    </div>
    <div id="target-banner">
      <div class="stat"><div class="stat-val" id="stat-turns">0</div><div class="stat-label">turns</div></div>
      <div id="target-center">
        <div class="label">Target</div>
        <div class="target-word" id="target-display">----</div>
      </div>
      <div class="stat"><div class="stat-val" id="stat-par">—</div><div class="stat-label">par</div></div>
    </div>
  </div>
  <div id="chain-area">
    <div id="chain"></div>
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;padding:3px 0;">
      <div id="input-step-num" style="font-size:11px;color:#ccc;width:18px;text-align:right;flex-shrink:0;"></div>
      <div id="input-row" style="display:flex;gap:5px;"></div>
    </div>
  </div>
  <div id="bottom">
    <div id="error-msg"></div>
    <div id="keyboard">
      <div class="kb-row" id="kb-row-1"></div>
      <div class="kb-row" id="kb-row-2"></div>
      <div class="kb-row" id="kb-row-3"></div>
    </div>
    <div id="hint-row">
      <button id="hint-btn">Need a hint?</button>
      <div id="hint-text"></div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="win-modal">
  <div class="modal">
    <h2 id="win-headline"></h2>
    <p id="win-body"></p>
    <div class="modal-grid" id="win-path"></div>
    <button class="modal-btn" id="share-btn">Copy result &#x2398;</button>
    <div id="copied-msg"></div>
    <button class="modal-btn" id="new-game-btn">New puzzle</button>
  </div>
</div>

 "firs", "fish", "five", "furs", "fury", "fuse", "gaga", "gags", "gate", "gaze", "gigs", "gimp", "girl", "give", "gods", "gulf", "guns", "gush", "guys", "gyms", "hags", "hath", "hats", "hawk", "hazy", "hide", "hike", "hips", "hiss", "hive", "hobo", "hoes", "hugs", "hula", "hulk", "hunh", "huns", "hush", "husk", "huts", "hype", "jiff", "joes", "joys", "jugs", "juke", "jury", "kegs", "kids", "kiln", "kilo", "kirk", "kiss", "kite", "labs", "lacy", "lads", "lava", "lech", "lice", "lids", "like", "lily", "limb", "lime", "limo", "lips", "lite", "live", "lube", "luce", "luge", "lull", "mach", "mama", "mano", "mash", "mask", "math", "mesa", "mesh", "meta", "mice", "mime", "mina", "mini", "mite", "mojo", "moth", "much", "mugs", "mule", "mute", "nice", "nite", "nosh", "nude", "null", "nuns", "nuts", "oath", "oily", "ooze", "ouch", "outs", "palm", "palp", "path", "pike", "pile", "pimp", "pipe", "pity", "pods", "pony", "puce", "pulp", "purr", "push", "racy", "rags", "rash", "rath", "rats", "reds", "ribs", "rice", "ride", "rigs", "rile", "ripe", "rise", "risk", "rite", "robe", "rods", "roto", "rube", "rubs", "rude", "ruff", "rule", "ruse", "rush", "simp", "tabs", "tags", "tape", "tate", "tide", "tiff", "tile", "tiny", "tips", "tosh", "tube", "tuna", "tush", "tusk", "type", "vase", "vibe", "vice", "vile", "vino", "vive", "vote", "wigs", "wimp", "wish", "with", "woes", "yipe", "yolk", "zero", "zeta", "acid", "aids", "ails", "arms", "avid", "both", "buff", "city", "cuff", "deke", "demo", "disc", "dish", "diva", "dojo", "duff", "duke", "duty", "dyke", "eves", "exes", "gaby", "gaff", "gawk", "gosh", "guff", "huge", "hypo", "java", "joey", "keys", "kobo", "lady", "lazy", "lido", "lulu", "many", "mayo", "meth", "muff", "myth", "nuke", "numb", "oils", "only", "puff", "redo", "reps", "rich", "rips", "ritz", "tidy", "tuba", "tubs", "typo", "viva", "aced", "adds", "army", "arts", "ditz", "even", "ever", "fido", "luau", "memo", "owls", "visa", "zany"];
// ── BFS ──
function neighbors(word){const res=[];for(let i=0;i<word.length;i++){for(let c=97;c<=122;c++){const ch=String.fromCharCode(c);if(ch!==word[i]){const cand=word.slice(0,i)+ch+word.slice(i+1);if(WORDS.has(cand))res.push(cand);}}}return res;}
function bfs(start,end){const queue=[[start]];const visited=new Set([start]);while(queue.length){const path=queue.shift();const cur=path[path.length-1];if(cur===end)return path;for(const n of neighbors(cur)){if(!visited.has(n)){visited.add(n);queue.push([...path,n]);}}}return null;}

// ── state ──
let target,currentWord,chain,hintsUsed,inputLetters,activeIdx;

function pickTarget(){const seed=Math.floor(Date.now()/86400000);return TARGETS[(seed*1013)%TARGETS.length];}

function initGame(tgt){
  target=tgt||pickTarget();
  currentWord="ship";
  chain=["ship"];
  hintsUsed=0;
  inputLetters=["","","",""];
  activeIdx=0;
  const hintPath=bfs("ship",target);
  const par=hintPath?hintPath.length-1:"?";
  document.getElementById("target-display").textContent=target.toUpperCase();
  document.getElementById("stat-par").textContent=par;
  document.getElementById("stat-turns").textContent="0";
  document.getElementById("error-msg").textContent="";
  document.getElementById("hint-text").textContent="";
  document.getElementById("win-modal").classList.remove("show");
  renderChain();
  renderInputRow();
  scrollChainToBottom();
}

// ── render committed chain ──
function renderChain(){
  const el=document.getElementById("chain");
  el.innerHTML="";
  chain.forEach((word,idx)=>{
    const prev=idx>0?chain[idx-1]:null;
    const div=document.createElement("div");
    div.className="chain-step";
    const num=document.createElement("div");
    num.className="step-num";
    num.textContent=idx===0?"—":idx;
    div.appendChild(num);
    const row=document.createElement("div");
    row.className="step-word";
    for(let i=0;i<word.length;i++){
      const box=document.createElement("div");
      if(idx===0){
        box.className="step-letter seed";
      } else {
        // correct = same as target at this position
        box.className="step-letter "+(word[i]===target[i]?"correct":"wrong");
      }
      box.textContent=word[i].toUpperCase();
      row.appendChild(box);
    }
    div.appendChild(row);
    el.appendChild(div);
  });
  document.getElementById("input-step-num").textContent=chain.length;
}

// ── render blank input boxes ──
function renderInputRow(){
  const container=document.getElementById("input-row");
  container.innerHTML="";
  for(let i=0;i<4;i++){
    const box=document.createElement("div");
    const letter=inputLetters[i];
    const isChanged=letter && letter!==currentWord[i];
    box.className="input-box"+(i===activeIdx?" active":"")+(isChanged?" changed":"");
    box.textContent=letter?letter.toUpperCase():"";
    box.dataset.idx=i;
    box.addEventListener("click",()=>{activeIdx=+box.dataset.idx;renderInputRow();});
    container.appendChild(box);
  }
}

function scrollChainToBottom(){
  const area=document.getElementById("chain-area");
  setTimeout(()=>{area.scrollTop=area.scrollHeight;},50);
}

// ── keyboard ──
const ROWS=[["q","w","e","r","t","y","u","i","o","p"],["a","s","d","f","g","h","j","k","l"],["ENTER","z","x","c","v","b","n","m","⌫"]];
ROWS.forEach((row,ri)=>{
  const el=document.getElementById("kb-row-"+(ri+1));
  row.forEach(key=>{
    const btn=document.createElement("button");
    btn.className="kb-key"+(key==="ENTER"?" submit":key==="⌫"?" wide del":"");
    btn.textContent=key;
    btn.addEventListener("click",()=>handleKey(key));
    el.appendChild(btn);
  });
});

function handleKey(key){
  document.getElementById("error-msg").textContent="";
  if(key==="⌫"){
    if(inputLetters[activeIdx]){
      inputLetters[activeIdx]="";
    } else if(activeIdx>0){
      activeIdx--;
      inputLetters[activeIdx]="";
    }
    renderInputRow();
    return;
  }
  if(key==="ENTER"){submitWord();return;}
  const ch=key.toLowerCase();
  if(!/^[a-z]$/.test(ch))return;
  inputLetters[activeIdx]=ch;
  if(activeIdx<3)activeIdx++;
  renderInputRow();
}

// physical keyboard support
document.addEventListener("keydown",(e)=>{
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(document.getElementById("win-modal").classList.contains("show"))return;
  if(e.key==="Backspace"){handleKey("⌫");}
  else if(e.key==="Enter"){handleKey("ENTER");}
  else if(/^[a-zA-Z]$/.test(e.key)){handleKey(e.key.toLowerCase());}
});

function countDiffs(a,b){let d=0;for(let i=0;i<a.length;i++)if(a[i]!==b[i])d++;return d;}

function submitWord(){
  const word=inputLetters.join("");
  if(word.length<4){showError("Fill in all 4 letters");return;}
  if(!WORDS.has(word)){showError('"'+word.toUpperCase()+'" isn\'t in the word list');return;}
  const diffs=countDiffs(word,currentWord);
  if(diffs===0){showError("Change at least one letter");return;}
  if(diffs>1){showError("Only one letter can change per turn");return;}
  currentWord=word;
  chain.push(word);
  inputLetters=Array.from(word);  // pre-fill next row with current word
  activeIdx=0;
  document.getElementById("stat-turns").textContent=chain.length-1;
  document.getElementById("hint-text").textContent="";
  renderChain();
  renderInputRow();
  scrollChainToBottom();
  if(word===target)setTimeout(showWin,350);
}

function showError(msg){document.getElementById("error-msg").textContent=msg;}

function showWin(){
  const turns=chain.length-1;
  const initPath=bfs("ship",target);
  const par=initPath?initPath.length-1:turns;
  const headlines=turns<=par?["You shipped it! 🚀","Delivered! 📦","Released to production!","Merged and deployed! ✓"]:["You shipped it!","Eventually shipped!","Ship it and iterate!","Done is better than perfect!"];
  document.getElementById("win-headline").textContent=headlines[Math.floor(Math.random()*headlines.length)];
  let body;
  if(turns===1)body="One move. That's not shipping, that's teleporting.";
  else if(turns<=par-2)body="Only "+turns+" turns — well under par. Ruthlessly efficient.";
  else if(turns===par)body=turns+" turns, right on par. Clean execution.";
  else if(turns<=par+2)body=turns+" turns. A little scope creep, but you shipped.";
  else body=turns+" turns. Every great product has a messy first sprint.";
  document.getElementById("win-body").textContent=body;
  // emoji grid
  const rows=[];
  for(let i=1;i<chain.length;i++){
    const prev=chain[i-1];const curr=chain[i];
    rows.push(curr.split("").map((l,j)=>l===target[j]?"🟩":l===prev[j]?"⬜":"🟨").join(""));
  }
  document.getElementById("win-path").innerHTML=rows.join("<br>");
  document.getElementById("win-modal").classList.add("show");
  document.getElementById("copied-msg").textContent="";
}

document.getElementById("hint-btn").addEventListener("click",()=>{
  const freshPath=bfs(currentWord,target);
  if(!freshPath||freshPath.length<=1){document.getElementById("hint-text").textContent="You're one step away — you've got this!";return;}
  const next=freshPath[1];
  const diffIdx=currentWord.split("").findIndex((c,i)=>c!==next[i]);
  hintsUsed++;
  let hint;
  if(hintsUsed>=2){hint='Position '+(diffIdx+1)+' → try "'+next.toUpperCase()+'"';}
  else{hint='Try changing letter '+(diffIdx+1)+' ('+["first","second","third","fourth"][diffIdx]+')';}
  document.getElementById("hint-text").textContent="Hint: "+hint;
});

document.getElementById("share-btn").addEventListener("click",()=>{
  const turns=chain.length-1;
  const initPath=bfs("ship",target);
  const par=initPath?initPath.length-1:turns;
  const rows=[];
  for(let i=1;i<chain.length;i++){
    const prev=chain[i-1];const curr=chain[i];
    rows.push(curr.split("").map((l,j)=>l===target[j]?"🟩":l===prev[j]?"⬜":"🟨").join(""));
  }
  const parStr=turns<=par?"⚡ under par":"turns: "+turns+"/"+par;
  const text="Ship it First! 🚀\nSHIP → ???? ("+parStr+")\n\n"+rows.join("\n")+"\n\nshipitfirst.com";
  navigator.clipboard.writeText(text).then(()=>{document.getElementById("copied-msg").textContent="Copied!";}).catch(()=>{document.getElementById("copied-msg").textContent="Couldn't copy — try long-pressing";});
});

document.getElementById("new-game-btn").addEventListener("click",()=>{
  const remaining=TARGETS.filter(t=>t!==target);
  initGame(remaining[Math.floor(Math.random()*remaining.length)]);
});

initGame();

// visualViewport.height is the only value iOS Safari reports correctly —
// window.innerHeight includes the hidden browser chrome (address bar, bottom toolbar).
function sizeShell(){
  const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const shell = document.getElementById("shell");
  shell.style.height = h + "px";
  // also offset from top in case viewport has scrolled (iOS iframe quirk)
  shell.style.top = (window.visualViewport ? window.visualViewport.offsetTop : 0) + "px";
  shell.style.position = "relative";
}
sizeShell();
window.addEventListener("resize", sizeShell);
if(window.visualViewport){
  window.visualViewport.addEventListener("resize", sizeShell);
  window.visualViewport.addEventListener("scroll", sizeShell);
}
</script>
